name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.26"
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Check golangci-lint
        run: golangci-lint version

      - name: Lint
        run: uv run strom check lint

      - name: Test
        run: uv run strom check test

      - name: Test repo tooling
        run: uv run strom check tools

  controller-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: controller/web/package-lock.json

      - name: Install controller web dependencies
        run: npm ci --prefix controller/web

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.26"
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Build controller web scaffold
        run: uv run strom build controller-web

  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.26"
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Build docs
        run: uv run strom docs build

  build-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.26"
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Build agent binaries
        run: uv run strom build agent --version ${{ github.sha }}

      - name: Upload agent artifacts
        uses: actions/upload-artifact@v4
        with:
          name: strom-agent-${{ github.sha }}
          path: dist/
          retention-days: 7

  sim-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.26"
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Bring up simulation rig
        run: uv run strom sim up --replicas 2 --version ${{ github.sha }}

      - name: Run simulation smoke assertions
        run: uv run strom sim scenario ci-smoke --replicas 2 --strict

      - name: Tear down simulation rig
        if: always()
        run: uv run strom sim down
